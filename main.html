<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-slate-50">
    <nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-50">
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4"
      >
        <div class="flex items-center gap-2">
          <img class="w-10 h-10" src="assets/github-logo.png" alt="" />
          <span class="text-xl font-bold text-slate-800 tracking-tight"
            >GitHub Issues Tracker</span
          >
        </div>

        <div class="flex flex-1 max-w-lg w-full items-center gap-3">
          <input
            type="text"
            id="searchInput"
            placeholder="Search Issues..."
            onkeyup="searchIssues()"
            class="w-full bg-slate-100 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none text-sm"
          />
          <button
            class="bg-[#5800FF] hover:bg-[#4a00d6] text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-1 shrink-0 transition-colors"
          >
            <span class="text-lg">+</span> New Issue
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
      <div
        id="allTab"
        class="bg-white p-1.5 rounded-xl border border-gray-200 inline-flex gap-1 mb-8 shadow-sm"
      >
        <button
          onclick="filterIssues('all', this)"
          class="tab-btn bg-[#5800FF] text-white px-6 py-2 rounded-lg text-sm font-semibold"
        >
          All
        </button>

        <button
          onclick="filterIssues('open', this)"
          class="tab-btn text-slate-500 px-6 py-2 rounded-lg text-sm font-semibold"
        >
          Open
        </button>

        <button
          onclick="filterIssues('closed', this)"
          class="tab-btn text-slate-500 px-6 py-2 rounded-lg text-sm font-semibold"
        >
          Closed
        </button>
      </div>

      <div class="flex flex-wrap justify-between items-end mb-8 gap-4">
        <div class="flex items-center gap-4">
          <div
            class="p-3 bg-indigo-50 rounded-xl text-indigo-600 border border-indigo-100"
          >
            <i class="fa-solid fa-bug"></i>
          </div>
          <div>
            <h2 id="issueCount" class="text-2xl font-black text-slate-800">
              0 Issues
            </h2>
            <p class="text-slate-500 text-sm font-medium">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-6 text-xs font-bold uppercase tracking-wider">
          <span class="flex items-center gap-2 text-green-600"
            ><span
              class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.5)]"
            ></span>
            Open</span
          >
          <span class="flex items-center gap-2 text-indigo-600"
            ><span
              class="w-2.5 h-2.5 bg-indigo-500 rounded-full shadow-[0_0_8px_rgba(99,102,241,0.5)]"
            ></span>
            Closed</span
          >
        </div>
      </div>

      <section
        id="issues"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></section>

      <!-- Issue Modal -->
      <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl">
          <!-- Title -->
          <h3
            id="modalTitle"
            class="text-xl font-bold text-slate-800 mb-2"
          ></h3>

          <!-- Status line -->
          <div class="flex items-center gap-2 text-sm text-slate-500 mb-4">
            <span
              id="modalStatus"
              class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700"
            ></span>
            <span>• Opened by <span id="modalAuthor"></span></span>
            <span>•</span>
            <span id="modalDate"></span>
          </div>

          <!-- Labels -->
          <div id="modalLabels" class="flex gap-2 mb-4"></div>

          <!-- Description -->
          <p id="modalDescription" class="text-sm text-slate-600 mb-6"></p>

          <!-- Info box -->
          <div class="bg-slate-100 rounded-lg p-4 flex justify-between mb-6">
            <div>
              <p class="text-sm text-slate-500">Assignee: </p>
              <p id="modalAssignee" class="font-semibold text-slate-800"></p>
            </div>

            <div>
              <p class="text-sm text-slate-500">Priority:</p>
              <span
                id="modalPriority"
                class="px-3 py-1 rounded-full text-xs font-bold bg-red-500 text-white"
              ></span>
            </div>
          </div>

          <!-- Close button -->
          <div class="modal-action">
            <form method="dialog">
              <button
                class="bg-[#5800FF] text-white px-5 py-2 rounded-lg font-semibold"
              >
                Close
              </button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="script.js"></script>
  </body>
</html>
