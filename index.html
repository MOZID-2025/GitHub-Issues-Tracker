<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="geist-font">
    <div class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
      <div
        class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-8 md:p-12"
      >
        <div class="flex flex-col items-center mb-8">
          <div class="w-16 h-16 mb-4">
            <img src="assets/github-logo.png" alt="" />
          </div>
          <h1 class="text-2xl font-bold text-slate-800">
            GitHub Issues Tracker
          </h1>
          <p class="text-slate-500 text-sm">Sign in to manage your issues</p>
        </div>

        <div
          id="messageBox"
          class="hidden mb-4 p-3 rounded-lg text-sm text-center"
        ></div>

        <form id="loginForm" class="space-y-5">
          <fieldset class="fieldset">
            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="username"
              placeholder="Enter Username"
              required
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
            <p
              class="text-[10px] text-indigo-600 mt-1 uppercase font-bold tracking-wider"
            >
              Default: admin
            </p>

            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              required
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
            <p
              class="text-[10px] text-indigo-600 mt-1 uppercase font-bold tracking-wider"
            >
              Default: admin123
            </p>

            <button
              id="login-btn"
              class="w-full bg-[#5800FF] hover:bg-[#4a00d6] text-white font-bold py-3 rounded-lg transition-all shadow-md active:scale-[0.98]"
            >
              Sign In
            </button>
          </fieldset>
        </form>

        <div class="relative flex items-center my-8 text-gray-300">
          <div class="flex-grow border-t border-gray-200"></div>
          <span class="mx-3 text-[10px] font-bold uppercase tracking-widest"
            >OR</span
          >
          <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div
          class="bg-slate-50 rounded-xl p-5 border border-slate-100 text-center"
        >
          <p class="text-slate-400 text-[10px] uppercase font-bold mb-2">
            Demo Credentials
          </p>
          <p class="text-sm text-slate-700"><strong>Username:</strong> admin</p>
          <p class="text-sm text-slate-700">
            <strong>Password:</strong> admin123
          </p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
