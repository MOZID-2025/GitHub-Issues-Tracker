<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
      <div
        class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-8 md:p-12"
      >
        <div class="flex flex-col items-center mb-8">
          <div class="w-16 h-16 mb-4">
            <svg
              viewBox="0 0 24 24"
              class="fill-slate-800"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
              />
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-slate-800">
            GitHub Issues Tracker
          </h1>
          <p class="text-slate-500 text-sm">Sign in to manage your issues</p>
        </div>

        <div
          id="messageBox"
          class="hidden mb-4 p-3 rounded-lg text-sm text-center"
        ></div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="username"
              placeholder="Enter Username"
              required
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
            <p
              class="text-[10px] text-indigo-600 mt-1 uppercase font-bold tracking-wider"
            >
              Default: admin
            </p>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              required
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
            />
            <p
              class="text-[10px] text-indigo-600 mt-1 uppercase font-bold tracking-wider"
            >
              Default: admin123
            </p>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-[#5800FF] hover:bg-[#4a00d6] text-white font-bold py-3 rounded-lg transition-all shadow-md active:scale-[0.98]"
          >
            Sign In
          </button>
        </form>

        <div class="relative flex items-center my-8 text-gray-300">
          <div class="flex-grow border-t border-gray-200"></div>
          <span class="mx-3 text-[10px] font-bold uppercase tracking-widest"
            >OR</span
          >
          <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div
          class="bg-slate-50 rounded-xl p-5 border border-slate-100 text-center"
        >
          <p class="text-slate-400 text-[10px] uppercase font-bold mb-2">
            Demo Credentials
          </p>
          <p class="text-sm text-slate-700"><strong>Username:</strong> admin</p>
          <p class="text-sm text-slate-700">
            <strong>Password:</strong> admin123
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
