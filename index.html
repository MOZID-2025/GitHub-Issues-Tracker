<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- custom css -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
      <div
        class="bg-white w-full max-w-md rounded-xl shadow-lg border border-gray-100 p-8 md:p-12"
      >
        <div class="flex flex-col items-center mb-8">
          <div class="w-20 h-20 mb-4">
            <img src="assets/github-logo.png" alt="" />
          </div>
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
            GitHub Issues Tracker
          </h1>
          <p class="text-slate-500 text-sm mt-1">
            Sign in to manage your issues
          </p>
        </div>

        <form action="#" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2"
              >Username</label
            >
            <input
              type="text"
              placeholder="Enter Username"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-400"
            />
            <p class="text-[11px] text-indigo-600 mt-1">Default: admin</p>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2"
              >Password</label
            >
            <input
              type="password"
              placeholder="Enter Password"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-gray-400"
            />
            <p class="text-[11px] text-indigo-600 mt-1">Default: admin123</p>
          </div>

          <button
            type="submit"
            class="w-full bg-[#5800FF] hover:bg-[#4a00d6] text-white font-semibold py-3 rounded-lg transition-colors shadow-md"
          >
            Sign In
          </button>
        </form>

        <div class="relative flex items-center my-8">
          <div class="flex-grow border-t border-gray-200"></div>
          <span
            class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-widest"
            >or</span
          >
          <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div
          class="bg-slate-50 rounded-xl p-6 text-center border border-slate-100"
        >
          <p class="text-slate-500 text-xs mb-3">Demo Credentials:</p>
          <div class="text-sm text-slate-700 space-y-1">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
